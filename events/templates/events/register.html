<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Event Registration</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }
        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items: center;
            background:#020617;
            padding:20px;
        }
        .container{
            width:900px;
            height:550px;
            display:flex;
            border-radius:25px;
            overflow:hidden;
            background:#0f172a;
            box-shadow:0 10px 40px rgba(0,0,0,0.5);
        }
        .left{
            flex:1;
            padding:60px;
            background:
            linear-gradient(rgba(15,23,42,0.8),
            rgba(15,23,42,0.9)),
            linear-gradient(135deg,#7c3aed,#2563eb);
            color:white;
            display:flex;
            flex-direction:column;
            justify-content:center;
        }
        .left h1{
            font-size:50px;
            line-height:1.2;
            margin-bottom:20px;
        }

        .left h1 span{
            color:#8b5cf6;
        }

        .left p{
            font-size:18px;
            color:#d1d5db;
            line-height:1.7;
            margin-bottom:40px;
        }

        .feature{
            display:flex;
            align-items:center;
            margin-bottom:20px;
            color:#e5e7eb;
        }

        .icon{
            width:45px;
            height:45px;
            border-radius:50%;
            background:rgba(255,255,255,0.1);
            display:flex;
            justify-content:center;
            align-items:center;
            margin-right:15px;
            font-size:20px;
        }
        .right{
            flex:1.2;
            padding:50px;
            background:#111827;
            display:flex;
            flex-direction:column;
            justify-content:center;
        }

        .right h2{
            color:white;
            text-align:center;
            font-size:40px;
            margin-bottom:10px;
        }

        .subtitle{
            text-align:center;
            color:#9ca3af;
            margin-bottom:35px;
        }

        form p{
            margin-bottom:18px;
        }

        label{
            display:block;
            margin-bottom:8px;
            color:#f3f4f6;
            font-weight:bold;
        }

        input{
            width:100%;
            padding:15px;
            border:none;
            border-radius:12px;
            background:#1e293b;
            color:white;
            font-size:15px;
        }

        input::placeholder{
            color:#94a3b8;
        }

        input:focus{
            outline:none;
            border:1px solid #8b5cf6;
            box-shadow:0 0 10px rgba(139,92,246,0.5);
        }

        button{
            width:100%;
            padding:15px;
            border:none;
            border-radius:12px;
            background:linear-gradient(135deg,#7c3aed,#2563eb);
            color:white;
            font-size:17px;
            cursor:pointer;
            margin-top:10px;
            transition:0.3s;
        }

        button:hover{
            transform:translateY(-2px);
            opacity:0.9;
        }

        .success{
            background:#064e3b;
            color:#6ee7b7;
            padding:12px;
            border-radius:10px;
            text-align:center;
            margin-bottom:15px;
        }

        .errorlist{
            list-style:none;
            color:#f87171;
            margin-top:5px;
            font-size:13px;
        }

        @media(max-width:900px){

            .container{
                flex-direction:column;
                height:auto;
            }

            .left,
            .right{
                width:100%;
            }

            .left h1{
                font-size:40px;
            }

        }
        @media (max-width: 768px){

            body{
                padding:20px;
                height:auto;
            }

            .container{
                width:100%;
                height:auto;
                flex-direction:column;
            }

            .left{
                padding:40px 30px;
                text-align:center;
                align-items:center;
            }

            .left h1{
                font-size:38px;
            }

            .left p{
                font-size:16px;
            }

            .feature{
                justify-content:center;
                font-size:15px;
            }

            .right{
                padding:40px 30px;
            }

            .right h2{
                font-size:32px;
            }

            input{
                padding:14px;
            }

            button{
                padding:14px;
            }

        }
        @media (max-width: 425px){

            body{
                padding:15px;
            }

            .container{
                border-radius:18px;
            }

            .left{
                padding:30px 20px;
            }

            .left h1{
                font-size:30px;
                line-height:1.3;
            }

            .left p{
                font-size:14px;
                margin-bottom:25px;
            }

            .feature{
                font-size:14px;
                margin-bottom:15px;
            }

            .icon{
                width:38px;
                height:38px;
                font-size:16px;
                margin-right:10px;
            }

            .right{
                padding:30px 20px;
            }

            .right h2{
                font-size:26px;
            }

            .subtitle{
                font-size:13px;
                margin-bottom:25px;
            }

            label{
                font-size:14px;
            }

            input{
                padding:12px;
                font-size:14px;
                border-radius:10px;
            }

            button{
                padding:12px;
                font-size:15px;
            }

        }
        @media (max-width: 375px){
            .left h1{
                font-size:26px;
            }
            .left p{
                font-size:13px;
            }
            .feature{
                font-size:13px;
            }
            .right{
                padding:25px 15px;
            }
            .right h2{
                font-size:22px;
            }
            .subtitle{
                font-size:12px;
            }
            input{
                padding:11px;
                font-size:13px;
            }
            button{
                font-size:14px;
                padding:11px;
            }
        }  
    </style>
</head>
<body>
    <div class="container">
        <div class="left">
            <h1>Register Today, <br><span>Be Part of Something Great!</span></h1>
            <div class="feature"><div class="icon">👥</div>Connect with amazing people</div>
            <div class="feature"><div class="icon">🎤</div>Learn from expert speakers</div>
            <div class="feature"><div class="icon">⭐</div>Experience something unique</div>
        </div>
        <div class="right">
            <h2>Event Registration</h2>
            <div class="subtitle">Please fill in your details to register</div>
            {% if success %}
                <div class="success">Registration Successful!</div>
            {% endif %}
            <form method="POST">
                {% csrf_token %}
                <p>
                    <label>Full Name</label>
                    <input 
                        type="text" 
                        name="full_name"
                        placeholder="Enter your full name (at least 5 characters)"
                    >
                </p>
                <p>
                    <label>Email Address</label>
                    <input 
                        type="email" 
                        name="email"
                        placeholder="example@gmail.com"
                    >
                </p>
                <p>
                    <label>Age</label>
                    <input 
                        type="number" 
                        name="age"
                        placeholder="Enter your age (18 and above)"
                    >
                </p>

                <p>
                    <label>Password</label>
                    <input 
                        type="password" 
                        name="password"
                        placeholder="Enter your password (minimum 8 characters)"
                    >
                </p>
                <button type="submit">
                    Register Now
                </button>
            </form>
        </div>
    </div>
</body>
</html>
